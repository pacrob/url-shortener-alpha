apiVersion: apps/v1
kind: Deployment
metadata:
  name: snip
  namespace: snip
  labels:
    app: snip
spec:
  replicas: 2
  selector:
    matchLabels:
      app: snip
  template:
    metadata:
      labels:
        app: snip
    spec:
      securityContext:
        runAsNonRoot: true
        # The image's "app" user is uid 1000. runAsNonRoot needs a numeric UID
        # to verify non-root, since the image declares the user by name.
        runAsUser: 1000
      # Credentials for pulling from the private ECR registry. Created out of
      # band (not in this repo) because the ECR token is short-lived:
      #   kubectl create secret docker-registry ecr-pull-secret \
      #     --docker-server=344378332628.dkr.ecr.us-east-1.amazonaws.com \
      #     --docker-username=AWS \
      #     --docker-password="$(aws ecr get-login-password --region us-east-1)" \
      #     -n snip
      imagePullSecrets:
        - name: ecr-pull-secret
      containers:
        - name: snip
          image: 344378332628.dkr.ecr.us-east-1.amazonaws.com/snip-url-shortener:latest
          # Pull from ECR. Always so each rollout fetches the current image.
          # Production: pin by digest (@sha256:...) instead of :latest — see
          # CLAUDE.md.
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: snip-config
          env:
            - name: REDIS_URL
              value: "redis://redis:6379/0"
            # Secret -> env plumbing (unused by the app for now; see secret.yaml).
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: snip-secret
                  key: REDIS_PASSWORD
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
