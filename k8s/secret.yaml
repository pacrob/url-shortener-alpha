apiVersion: v1
kind: Secret
metadata:
  name: snip-secret
  namespace: snip
type: Opaque
# Plumbing for the password pattern. Redis isn't password-protected yet, so the
# app doesn't consume this value — it's wired into the Deployment now so the
# Secret -> env path exists. stringData is auto base64-encoded by Kubernetes.
stringData:
  REDIS_PASSWORD: "snip-redis-password"
