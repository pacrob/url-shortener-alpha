apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: snip
  labels:
    app: redis
spec:
  # ClusterIP: reachable only inside the cluster. The app talks to it via the
  # DNS name "redis" (redis://redis:6379/0).
  type: ClusterIP
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
